services:
  keycloak-database:
    image: postgres:latest
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    ports:
      - ":5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB}"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command:
      - start
      - "--import-realm"
    ports:
      - "8080:8080"
    networks:
      default:
        aliases:
          - ${KEYCLOAK_URL}
    volumes:
      - ./leetcode-realm.json:/opt/keycloak/data/import/realm-config.json
    depends_on:
      keycloak-database:
        condition: service_healthy
    environment:
      KC_DB_URI_DATABASE: ${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME_URL: "http://auth.localhost"
      KC_HOSTNAME-_ADDMIN_URL: "http://auth.localhost"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
  config:
    build: ./config-service
    ports:
      - "8888:8888"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8888/actuator/health || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 5s
  discovery:
    build: ./discovery-service
    ports:
      - "8761:8761"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8761/actuator/health || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      config:
        condition: service_healthy
  executor:
    build: ./executor-service
    cap_drop:
      - ALL
    cap_add:
      - SETFCAP
      - SETGID
    security_opt:
      - no-new-privileges
      - seccomp=unconfined
    ports:
      - ":8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/actuator/health || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      config:
        condition: service_healthy
      discovery:
        condition: service_healthy
  problem-database:
    image: postgres:latest
    environment:
      POSTGRES_DB: ${PROBLEM_DB}
      POSTGRES_USER: ${PROBLEM_DB_USER}
      POSTGRES_PASSWORD: ${PROBLEM_DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PROBLEM_DB_USER} -d ${PROBLEM_DB}"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  problem:
    build:
      context: ./problem-service
    environment:
      KEYCLOAK_URL: "auth.localhost"
      PROBLEM_DB: ${PROBLEM_DB}
      PROBLEM_DB_USER: ${PROBLEM_DB_USER}
      PROBLEM_DB_PASSWORD: ${PROBLEM_DB_PASSWORD}
    ports:
      - "8081:8080"
    depends_on:
      keycloak:
        condition: service_started
      config:
        condition: service_healthy
      discovery:
        condition: service_healthy
      problem-database:
        condition: service_healthy
  submission-database:
    image: postgres:latest
    environment:
      POSTGRES_DB: ${SUBMISSION_DB}
      POSTGRES_USER: ${SUBMISSION_DB_USER}
      POSTGRES_PASSWORD: ${SUBMISSION_DB_PASSWORD}
    ports:
      - ":5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${SUBMISSION_DB_USER} -d ${SUBMISSION_DB}"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
  submission:
    build:
      context: ./submission-service
    environment:
      KEYCLOAK_URL: "auth.localhost"
      SUBMISSION_DB: ${SUBMISSION_DB}
      SUBMISSION_DB_USER: ${SUBMISSION_DB_USER}
      SUBMISSION_DB_PASSWORD: ${SUBMISSION_DB_PASSWORD}
    ports:
      - "8082:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/actuator/health || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      keycloak:
        condition: service_started
      config:
        condition: service_healthy
      discovery:
        condition: service_healthy
      submission-database:
        condition: service_healthy
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@127.0.0.1:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://127.0.0.1:29093
  gateway:
    build: ./gateway-service
    ports:
      - "80:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/actuator/health || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      config:
        condition: service_healthy
      discovery:
        condition: service_healthy
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
