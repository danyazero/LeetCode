apiVersion: apps/v1
kind: Deployment
metadata:
  name: problem
spec:
  replicas: 1
  selector:
    matchLabels:
      app: problem
  template:
    metadata:
      labels:
        app: problem
    spec:
      containers:
        - name: problem
          image: problem-service:latest
          imagePullPolicy: Never
          env:
            - name: KEYCLOAK_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: keycloak-url
            - name: PROBLEM_DB
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: problem-db
            - name: PROBLEM_DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: problem-db-user
            - name: PROBLEM_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: problem-db-password
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: problem
spec:
  selector:
    app: problem
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP