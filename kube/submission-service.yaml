apiVersion: apps/v1
kind: Deployment
metadata:
  name: submission
spec:
  replicas: 1
  selector:
    matchLabels:
      app: submission
  template:
    metadata:
      labels:
        app: submission
    spec:
      containers:
        - name: submission
          image: submission-service:latest
          imagePullPolicy: Never
          env:
            - name: KEYCLOAK_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: keycloak-url
            - name: SUBMISSION_DB
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: submission-db
            - name: SUBMISSION_DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: submission-db-user
            - name: SUBMISSION_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: submission-db-password
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: submission
spec:
  selector:
    app: submission
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP