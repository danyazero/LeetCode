spring:
  jpa:
    properties:
      hibernate:
        dialect: com.danyazero.problemservice.config.PostgresDialect
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/realms/leetcode/protocol/openid-connect/certs
  application:
    name: problem
  datasource:
    username: ${PROBLEM_DB_USER}
    password: ${PROBLEM_DB_PASSWORD}
    url: jdbc:postgresql://problem-database:5432/${PROBLEM_DB}

kafka:
  bootstrap-servers-config: kafka:9092
  
springdoc:
  api-docs:
    path: /api/v3/api-docs
  swwagger-ui:
    enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://discovery:8761/eureka
  instance:
    prefer-ip-address: true
